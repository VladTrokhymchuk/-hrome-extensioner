<!doctype html>
<html lang="uk">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WP Admin Bar</title>
    <style>
        :root {
            color-scheme: light dark;
        }

        body {
            font-family: Inter, sans-serif;
            color: #111119;
            font-style: normal;
            line-height: 120%;
            margin: 24px 16px 14px;
            min-width: 280px;
            max-width: 320px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .title {
            font-weight: 600;
            font-size: 14px;
            letter-spacing: -0.02em;
        }

        .muted {
            color: #707090;
            font-size: 12px;
        }

        .panel {
            background-color: #fdfdff;
            border: 1px solid #ebebf2;
            box-shadow: 0 0 15px -5px #e8e8e8;
            border-radius: 12px;
            padding: 12px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .row+.row {
            margin-top: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background-color: #2459dc;
            color: #fff;
            font-size: 14px;
            width: max-content;
            border-radius: 4px;
            border: 0;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #2653c5;
        }

        .btn:active {
            background-color: #2653c5;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 22px;
        }

        .switch input {
            display: none;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: color-mix(in oklab, CanvasText 15%, Canvas 85%);
            transition: background .2s ease;
            border-radius: 999px;
        }

        .slider:before {
            content: "";
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            top: 3px;
            background: Canvas;
            transition: transform .2s ease;
            border-radius: 50%;
            box-shadow: 0 1px 2px rgb(0 0 0 / .24);
        }

        input:checked+.slider {
            background: #22c55e;
        }

        input:checked+.slider:before {
            transform: translateX(14px);
        }
    </style>
    <script src="popup.js" defer></script>
</head>

<body>
    <div class="header">
        <div class="title">WP Admin Bar</div>
        <div class="muted">Керування видимістю</div>
    </div>
    <div class="panel">
        <div class="row">
            <div>
                <div style="font-weight:600;">Прибрати адмін‑бар</div>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle" />
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <button id="wpAdminBtn" class="btn" type="button" title="Відкрити /wp-admin">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M14 3h7v7h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H14V3z"></path>
                    <path d="M5 5h6v2H7v10h10v-4h2v6H5V5z"></path>
                </svg>
                <span>Відкрити wp‑admin</span>
            </button>
        </div>
    </div>
</body>

</html>
